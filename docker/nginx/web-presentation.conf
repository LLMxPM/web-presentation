# 文件功能：为平台镜像内的 Editor Gateway 提供静态资源托管与 Backend/Runtime 反向代理配置。

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_x_request_id $wp_request_id {
    default $http_x_request_id;
    '' $request_id;
}

log_format wp_json escape=json '{"ts":"$time_iso8601","level":"INFO","service":"gateway","module":"nginx.access","event":"http.request.completed","message":"Gateway 请求完成。","request_id":"$wp_request_id","method":"$request_method","path":"$uri","status_code":$status,"duration_seconds":$request_time,"upstream_status":"$upstream_status","upstream_response_time":"$upstream_response_time","remote_addr":"$remote_addr"}';

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 100m;
    access_log /dev/stdout wp_json;
    error_log /dev/stderr warn;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ~ ^/(api|public|build-artifacts|preview|media)(/|$) {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $wp_request_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_pass http://backend:8000;
    }

    location = /runtime {
        return 301 /runtime/;
    }

    location /runtime/ {
        proxy_http_version 1.1;
        proxy_set_header Host runtime;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $wp_request_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_pass http://runtime:7373;
    }

    location ~ ^/(?:@vite|@id|@fs|@runtime-preview|node_modules/\.vite|src)(?:/|$) {
        proxy_http_version 1.1;
        proxy_set_header Host runtime;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $wp_request_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_pass http://runtime:7373;
    }

    location ~ ^/(?:__vite_ping|__preview-tailwind\.css|__runtime-snapdom-resource-proxy)(?:\?|$) {
        proxy_http_version 1.1;
        proxy_set_header Host runtime;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $wp_request_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_pass http://runtime:7373;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
