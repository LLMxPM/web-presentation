# 文件功能：提供外部 PostgreSQL/Redis 的简化部署编排模板，环境变量直接在本文件内配置。

# 使用前请至少修改：
# - DATABASE_URL、REDIS_URL：改为已有 PostgreSQL/Redis 地址。
# - BACKEND_PUBLIC_BASE_URL、RUNTIME_PUBLIC_BASE_URL、CORS_ORIGINS：改为实际访问入口。
# - RUNTIME_SERVER_BASE_PATH 应与 RUNTIME_PUBLIC_BASE_URL 的 URL path 保持一致：
#   同域 /runtime 使用 /runtime/；独立 Runtime 根域名 https://runtime.example.com 使用 /。
# - DEFAULT_ADMIN_PASSWORD、AI_SECRET_ENCRYPTION_KEY：正式部署前必须替换。
# - AI_SECRET_ENCRYPTION_KEY 必须是 Fernet 密钥：32 字节随机值的 URL-safe base64 编码，
#   通常长度为 44 个字符并以 = 结尾；可用命令生成：
#   python -c "import base64, os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())"
#   该值用于加密大模型api key，部署后必须长期保存，更换会导致已有密文无法解密。

services:
  platform:
    image: llmxpm/web-presentation:latest
    restart: unless-stopped
    working_dir: /app/backend
    environment:
      DATABASE_URL: "postgresql+asyncpg://wp_user:change-postgres-password@postgres.example.internal:5432/web_presentation"
      REDIS_URL: "redis://:change-redis-password@redis.example.internal:6379/0"
      BACKEND_PUBLIC_BASE_URL: "http://127.0.0.1:8080"
      RUNTIME_BASE_URL: "http://runtime:7373"
      # 浏览器访问 Runtime 的地址；独立 Runtime 域名部署时可改为 "https://runtime.example.com"。
      RUNTIME_PUBLIC_BASE_URL: "http://127.0.0.1:8080/runtime"
      CORS_ORIGINS: '["http://127.0.0.1:8080"]'
      DEFAULT_ADMIN_PASSWORD: "change-admin-password"
      AI_SECRET_ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      LOG_LEVEL: "INFO"
      LOG_FORMAT: "json"
      ACCESS_LOG_ENABLED: "false"
      CLIENT_ERROR_LOG_ENABLED: "true"
      CLIENT_ERROR_LOG_MAX_BYTES: "16384"
      PLAYWRIGHT_BROWSER_POOL_SIZE: "2"
      PLAYWRIGHT_TASK_QUEUE_SIZE: "16"
      PLAYWRIGHT_BROWSER_REUSE_ENABLED: "true"
      AI_PAGE_MUTATION_CONCURRENCY: "2"
      AI_PAGE_MUTATION_MAX_ACTIVE_JOBS: "64"
      AI_PAGE_MUTATION_MAX_BATCH_SIZE: "16"
      DURABLE_JOB_LEASE_SECONDS: "300"
      DURABLE_JOB_HEARTBEAT_SECONDS: "30"
      RUNTIME_DIAGNOSTICS_REQUEST_TIMEOUT_SECONDS: "180"
      RUNTIME_BUILD_REQUEST_TIMEOUT_SECONDS: "900"
      ASSET_STORAGE_DRIVER: "local"
    volumes:
      - backend-data:/app/backend/data
    ports:
      - "8080:80"
    expose:
      - "8000"
    extra_hosts:
      - "backend:127.0.0.1"
    networks:
      default:
        aliases:
          - backend
    depends_on:
      runtime:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1/healthz >/dev/null && curl -fsS http://127.0.0.1:8000/healthz >/dev/null
      interval: 10s
      timeout: 5s
      retries: 5

  runtime:
    image: llmxpm/web-runtime-vue:latest
    restart: unless-stopped
    environment:
      RUNTIME_PREVIEW_JWKS_URL: "http://backend:8000/.well-known/jwks.json"
      RUNTIME_SERVICE_TOKEN_AUDIENCE: "runtime-backend"
      RUNTIME_BACKEND_API_BASE_URL: "http://backend:8000"
      # Runtime Vite 资源挂载路径，应等于 RUNTIME_PUBLIC_BASE_URL 的 path；独立 Runtime 根域名部署时改为 "/"。
      RUNTIME_SERVER_BASE_PATH: "/runtime/"
      RUNTIME_LOG_LEVEL: "info"
      RUNTIME_LOG_FORMAT: "json"
      RUNTIME_ACCESS_LOG_ENABLED: "false"
      RUNTIME_VITE_TASK_CONCURRENCY: "2"
      RUNTIME_VITE_TASK_QUEUE_SIZE: "16"
      RUNTIME_VITE_TASK_QUEUE_WAIT_TIMEOUT_MS: "30000"
      RUNTIME_VITE_DIAGNOSTICS_WEIGHT: "3"
      RUNTIME_BUILD_WORKER_MAX_OLD_SPACE_MB: "2048"
      RUNTIME_BUILD_WORKER_TIMEOUT_MS: "600000"
      RUNTIME_DIAGNOSTICS_WORKER_TIMEOUT_MS: "120000"
      RUNTIME_DIAGNOSTICS_WORKER_REUSE_ENABLED: "true"
      RUNTIME_DIAGNOSTICS_WORKER_MAX_TASKS: "25"
      RUNTIME_DIAGNOSTICS_WORKER_MAX_AGE_MS: "1800000"
      RUNTIME_DIAGNOSTICS_WORKER_RSS_RECYCLE_RATIO: "0.75"
    expose:
      - "7373"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - const port=process.env.RUNTIME_SERVER_PORT||'7373'; fetch('http://127.0.0.1:'+port+'/__runtime_healthz').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  backend-data:
