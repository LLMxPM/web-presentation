# 文件功能：提供链接 deploy/.env 的生产可维护编排模板，拆分迁移、Backend、Runtime 与 Gateway 以便独立观测和重启。

x-production-env: &production-env
  env_file:
    - .env

services:
  backend-migrate:
    <<: *production-env
    image: llmxpm/web-presentation:latest
    restart: "no"
    working_dir: /app/backend
    command: ["alembic", "upgrade", "head"]

  backend:
    <<: *production-env
    image: llmxpm/web-presentation:latest
    restart: unless-stopped
    working_dir: /app/backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - backend-data:/app/backend/data
    expose:
      - "8000"
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  runtime:
    <<: *production-env
    image: llmxpm/web-runtime-vue:latest
    restart: unless-stopped
    expose:
      - "7373"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - const port=process.env.RUNTIME_SERVER_PORT||'7373'; fetch('http://127.0.0.1:'+port+'/__runtime_healthz').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: llmxpm/web-presentation:latest
    restart: unless-stopped
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      runtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  backend-data:
