name: platform-test

on:
  pull_request:
  workflow_dispatch:

jobs:
  detect-runtime-change:
    runs-on: ubuntu-latest
    outputs:
      runtime_changed: ${{ steps.filter.outputs.runtime_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            runtime_changed:
              - 'runtime/**'
              - '.gitmodules'

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --project backend --group dev
      - run: pnpm run test:backend:unit
      - run: pnpm run test:backend:api
      - run: pnpm run test:backend:integration

  editor-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: editor/pnpm-lock.yaml
      - run: pnpm --dir editor install --frozen-lockfile
      - run: pnpm run test:editor

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm run test:contracts

  runtime-delegated:
    runs-on: ubuntu-latest
    needs: detect-runtime-change
    if: needs.detect-runtime-change.outputs.runtime_changed == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: runtime/pnpm-lock.yaml
      - run: pnpm --dir runtime install --frozen-lockfile
      - run: pnpm --dir runtime check
      - run: pnpm --dir runtime test
      - run: pnpm --dir runtime build

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --dir editor install --frozen-lockfile
      - run: pnpm --dir runtime install --frozen-lockfile
      - run: docker compose -f docker-compose.dev.yml up -d
      - run: uv sync --project backend --group dev
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run test:reset:data
        env:
          AI_TEST_MODE: mock
      - run: pnpm run test:seed:smoke
        env:
          AI_TEST_MODE: mock
      - run: node ./scripts/testing/ensure-services.mjs
        env:
          TESTING_START_BACKEND: 'true'
          TESTING_START_EDITOR: 'true'
          TESTING_START_RUNTIME: 'true'
          AI_TEST_MODE: mock
      - run: pnpm run test:e2e
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
