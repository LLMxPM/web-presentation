name: platform-release

permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 要发布到 Docker Hub 的镜像标签，例如 v1.2.3
        required: true
        type: string
      push_latest:
        description: 是否同时推送 latest 标签
        required: true
        default: false
        type: boolean

jobs:
  release-meta:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      push_latest: ${{ steps.meta.outputs.push_latest }}
    steps:
      - id: meta
        env:
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          EVENT_RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            release_tag="${EVENT_RELEASE_TAG}"
            if [ "${EVENT_RELEASE_PRERELEASE}" = "true" ]; then
              push_latest="false"
            else
              push_latest="true"
            fi
          else
            release_tag="${INPUT_RELEASE_TAG}"
            push_latest="${INPUT_PUSH_LATEST}"
          fi

          if [ -z "${release_tag}" ]; then
            echo "release_tag 不能为空。" >&2
            exit 1
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "push_latest=${push_latest}" >> "${GITHUB_OUTPUT}"

  backend-tests:
    runs-on: ubuntu-latest
    needs: release-meta
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --project backend --group dev
      - run: uv run --project backend pytest -c backend/pyproject.toml -m unit
      - run: uv run --project backend pytest -c backend/pyproject.toml -m api
      - run: uv run --project backend pytest -c backend/pyproject.toml -m integration

  editor-tests:
    runs-on: ubuntu-latest
    needs: release-meta
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: editor/pnpm-lock.yaml
      - run: pnpm --dir editor install --frozen-lockfile
      - run: pnpm run test:editor:gate

  contracts:
    runs-on: ubuntu-latest
    needs: release-meta
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm run test:contracts

  e2e-smoke:
    runs-on: ubuntu-latest
    needs:
      - release-meta
      - backend-tests
      - editor-tests
      - contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --dir editor install --frozen-lockfile
      - run: pnpm --dir runtime install --frozen-lockfile
      - run: docker compose -f docker-compose.dev.yml up -d
      - run: uv sync --project backend --group dev
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run test:e2e
        env:
          TESTING_START_BACKEND: 'true'
          TESTING_START_EDITOR: 'true'
          TESTING_START_RUNTIME: 'true'
          AI_TEST_MODE: mock
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-e2e
          path: test-results

  validate-runtime-image:
    runs-on: ubuntu-latest
    needs:
      - release-meta
      - backend-tests
      - editor-tests
      - contracts
    outputs:
      runtime_sha: ${{ steps.runtime.outputs.runtime_sha }}
      runtime_short_sha: ${{ steps.runtime.outputs.runtime_short_sha }}
      runtime_image: ${{ steps.runtime.outputs.runtime_image }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - id: runtime
        run: |
          runtime_sha="$(git -C runtime rev-parse HEAD)"
          runtime_short_sha="${runtime_sha:0:12}"
          runtime_image="docker.io/llmxpm/web-runtime-vue:sha-${runtime_short_sha}"

          echo "runtime_sha=${runtime_sha}" >> "${GITHUB_OUTPUT}"
          echo "runtime_short_sha=${runtime_short_sha}" >> "${GITHUB_OUTPUT}"
          echo "runtime_image=${runtime_image}" >> "${GITHUB_OUTPUT}"
      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/setup-buildx-action@v4
      - run: docker buildx imagetools inspect "${{ steps.runtime.outputs.runtime_image }}"

  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - release-meta
      - backend-tests
      - editor-tests
      - contracts
      - e2e-smoke
      - validate-runtime-image
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/setup-buildx-action@v4
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/llmxpm/web-presentation
          tags: |
            type=raw,value=${{ needs.release-meta.outputs.release_tag }}
            type=raw,value=latest,enable=${{ needs.release-meta.outputs.push_latest == 'true' }}
          labels: |
            org.opencontainers.image.title=web-presentation
            org.opencontainers.image.description=web-presentation Backend and Editor platform image
            org.opencontainers.image.version=${{ needs.release-meta.outputs.release_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            com.web-presentation.runtime.sha=${{ needs.validate-runtime-image.outputs.runtime_sha }}
            com.web-presentation.runtime.image=${{ needs.validate-runtime-image.outputs.runtime_image }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=platform
          cache-to: type=gha,mode=max,scope=platform

  build-and-push-lite:
    runs-on: ubuntu-latest
    needs:
      - release-meta
      - backend-tests
      - editor-tests
      - contracts
      - e2e-smoke
      - validate-runtime-image
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/setup-buildx-action@v4
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/llmxpm/web-presentation
          tags: |
            type=raw,value=sqlite-lite-${{ needs.release-meta.outputs.release_tag }}
            type=raw,value=sqlite-lite,enable=${{ needs.release-meta.outputs.push_latest == 'true' }}
          labels: |
            org.opencontainers.image.title=web-presentation-sqlite-lite
            org.opencontainers.image.description=web-presentation SQLite + memory runtime single-container image
            org.opencontainers.image.version=sqlite-lite-${{ needs.release-meta.outputs.release_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            com.web-presentation.image.variant=sqlite-lite
            com.web-presentation.runtime.embedded=true
            com.web-presentation.runtime.sha=${{ needs.validate-runtime-image.outputs.runtime_sha }}
            com.web-presentation.runtime.image=${{ needs.validate-runtime-image.outputs.runtime_image }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.lite
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=platform-lite
          cache-to: type=gha,mode=max,scope=platform-lite
