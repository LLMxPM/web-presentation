<!-- 文件功能：平台介绍文档的产品总览占位示意图。 -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">平台总览占位图</title>
  <desc id="desc">展示 Editor、Backend、Runtime、资产库和 AI Agent 之间关系的占位示意图。</desc>
  <rect width="1200" height="620" fill="#f7f8fb"/>
  <rect x="44" y="44" width="1112" height="532" rx="28" fill="#ffffff" stroke="#d7dce5" stroke-width="2"/>
  <text x="92" y="108" fill="#172033" font-family="Arial, sans-serif" font-size="34" font-weight="700">web-presentation 平台总览</text>
  <text x="92" y="148" fill="#5c667a" font-family="Arial, sans-serif" font-size="18">占位图：后续可替换为真实产品截图或架构示意图</text>
  <g font-family="Arial, sans-serif">
    <rect x="92" y="214" width="250" height="160" rx="18" fill="#e8f1ff" stroke="#8ab4f8"/>
    <text x="122" y="270" fill="#102a56" font-size="26" font-weight="700">Editor</text>
    <text x="122" y="310" fill="#334763" font-size="17">创作工作台</text>
    <text x="122" y="338" fill="#334763" font-size="17">页面 / 资源 / AI</text>
    <rect x="442" y="214" width="250" height="160" rx="18" fill="#eaf8ef" stroke="#7bcf9b"/>
    <text x="472" y="270" fill="#123f27" font-size="26" font-weight="700">Backend</text>
    <text x="472" y="310" fill="#345343" font-size="17">权限与数据</text>
    <text x="472" y="338" fill="#345343" font-size="17">预览 / 构建 / AI 上下文</text>
    <rect x="792" y="214" width="250" height="160" rx="18" fill="#fff2df" stroke="#f0b76a"/>
    <text x="822" y="270" fill="#5a3106" font-size="26" font-weight="700">Runtime</text>
    <text x="822" y="310" fill="#654518" font-size="17">预览与构建</text>
    <text x="822" y="338" fill="#654518" font-size="17">截图 / 诊断 / 渲染</text>
    <rect x="190" y="436" width="300" height="82" rx="16" fill="#f1edff" stroke="#b8a5ff"/>
    <text x="222" y="486" fill="#3d2f6f" font-size="22" font-weight="700">工作空间资产库</text>
    <rect x="610" y="436" width="300" height="82" rx="16" fill="#ffeef4" stroke="#f2a4be"/>
    <text x="642" y="486" fill="#683044" font-size="22" font-weight="700">AI Agent 协作</text>
  </g>
  <g stroke="#8a93a6" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M342 294H442"/>
    <path d="M692 294H792"/>
    <path d="M490 436l-90-62"/>
    <path d="M610 436l90-62"/>
  </g>
</svg>
