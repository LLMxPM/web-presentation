<!-- 文件功能：主题、字体与样式管理体系文档的占位示意图。 -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">主题字体样式体系占位图</title>
  <desc id="desc">展示字体注册、主题库、样式库到项目页面和组件预览的关系。</desc>
  <rect width="1200" height="560" fill="#f7f8fb"/>
  <rect x="56" y="54" width="1088" height="452" rx="24" fill="#ffffff" stroke="#d8dee9" stroke-width="2"/>
  <text x="94" y="112" fill="#182236" font-family="Arial, sans-serif" font-size="32" font-weight="700">主题、字体与样式管理体系</text>
  <text x="94" y="150" fill="#68738a" font-family="Arial, sans-serif" font-size="18">占位图：后续可替换为真实主题设置与样式库截图</text>
  <g font-family="Arial, sans-serif">
    <rect x="108" y="226" width="190" height="132" rx="18" fill="#edf5ff" stroke="#90b6ef"/>
    <text x="156" y="282" fill="#18345d" font-size="25" font-weight="700">字体</text>
    <text x="138" y="318" fill="#51647c" font-size="16">品牌字体 / 正文</text>
    <rect x="370" y="226" width="190" height="132" rx="18" fill="#eef8f2" stroke="#84cf9d"/>
    <text x="418" y="282" fill="#193f2a" font-size="25" font-weight="700">主题</text>
    <text x="400" y="318" fill="#52695c" font-size="16">色板 / Logo / 字体</text>
    <rect x="632" y="226" width="190" height="132" rx="18" fill="#fff4e4" stroke="#edbd74"/>
    <text x="680" y="282" fill="#583509" font-size="25" font-weight="700">样式</text>
    <text x="660" y="318" fill="#6a5738" font-size="16">尺寸 / 字号 / 规范</text>
    <rect x="894" y="204" width="190" height="176" rx="18" fill="#fff0f5" stroke="#eda7bd"/>
    <text x="942" y="270" fill="#653246" font-size="25" font-weight="700">页面</text>
    <text x="926" y="308" fill="#745262" font-size="16">组件 / 预览 / 构建</text>
  </g>
  <g stroke="#8791a3" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M306 292h54"/>
    <path d="M350 282l10 10-10 10"/>
    <path d="M568 292h54"/>
    <path d="M612 282l10 10-10 10"/>
    <path d="M830 292h54"/>
    <path d="M874 282l10 10-10 10"/>
  </g>
</svg>
