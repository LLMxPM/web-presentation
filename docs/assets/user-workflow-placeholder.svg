<!-- 文件功能：用户快速上手文档的创作流程占位示意图。 -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">用户创作流程占位图</title>
  <desc id="desc">展示登录、创建项目、编辑页面、AI 协作、预览和构建的占位流程。</desc>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="72" y="86" fill="#162033" font-family="Arial, sans-serif" font-size="34" font-weight="700">从项目到交付的基础流程</text>
  <text x="72" y="126" fill="#657089" font-family="Arial, sans-serif" font-size="18">占位图：可替换为真实工作台流程截图</text>
  <g font-family="Arial, sans-serif">
    <g>
      <rect x="72" y="210" width="150" height="128" rx="18" fill="#ffffff" stroke="#cad3e0" stroke-width="2"/>
      <text x="112" y="260" fill="#1c2b44" font-size="22" font-weight="700">登录</text>
      <text x="104" y="298" fill="#637085" font-size="16">进入平台</text>
    </g>
    <g>
      <rect x="282" y="210" width="150" height="128" rx="18" fill="#ffffff" stroke="#cad3e0" stroke-width="2"/>
      <text x="310" y="260" fill="#1c2b44" font-size="22" font-weight="700">工作空间</text>
      <text x="314" y="298" fill="#637085" font-size="16">准备资产</text>
    </g>
    <g>
      <rect x="492" y="210" width="150" height="128" rx="18" fill="#ffffff" stroke="#cad3e0" stroke-width="2"/>
      <text x="526" y="260" fill="#1c2b44" font-size="22" font-weight="700">项目页面</text>
      <text x="520" y="298" fill="#637085" font-size="16">编辑内容</text>
    </g>
    <g>
      <rect x="702" y="210" width="150" height="128" rx="18" fill="#ffffff" stroke="#cad3e0" stroke-width="2"/>
      <text x="743" y="260" fill="#1c2b44" font-size="22" font-weight="700">AI 协作</text>
      <text x="733" y="298" fill="#637085" font-size="16">生成改写</text>
    </g>
    <g>
      <rect x="912" y="210" width="150" height="128" rx="18" fill="#ffffff" stroke="#cad3e0" stroke-width="2"/>
      <text x="953" y="260" fill="#1c2b44" font-size="22" font-weight="700">交付</text>
      <text x="939" y="298" fill="#637085" font-size="16">预览构建</text>
    </g>
  </g>
  <g stroke="#7d8798" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M232 274h40"/>
    <path d="M262 264l10 10-10 10"/>
    <path d="M442 274h40"/>
    <path d="M472 264l10 10-10 10"/>
    <path d="M652 274h40"/>
    <path d="M682 264l10 10-10 10"/>
    <path d="M862 274h40"/>
    <path d="M892 264l10 10-10 10"/>
  </g>
</svg>
