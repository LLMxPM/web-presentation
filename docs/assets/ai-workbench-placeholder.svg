<!-- 文件功能：AI 协作创作指南的工作台占位示意图。 -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">AI 工作台占位图</title>
  <desc id="desc">展示页面编辑区、预览区和 AI 侧边栏协作关系的占位示意图。</desc>
  <rect width="1200" height="620" fill="#f6f8fb"/>
  <rect x="54" y="54" width="1108" height="492" rx="22" fill="#ffffff" stroke="#d8dee9" stroke-width="2"/>
  <g font-family="Arial, sans-serif">
    <text x="86" y="108" fill="#172033" font-size="32" font-weight="700">AI 协作工作台</text>
    <text x="86" y="144" fill="#657089" font-size="18">占位图：可替换为真实 Editor + AI 侧边栏截图</text>
    <rect x="86" y="188" width="320" height="300" rx="16" fill="#eef5ff" stroke="#9dbcf2"/>
    <text x="116" y="238" fill="#17345f" font-size="24" font-weight="700">页面编辑区</text>
    <rect x="120" y="268" width="250" height="16" rx="8" fill="#aac8f8"/>
    <rect x="120" y="304" width="190" height="16" rx="8" fill="#c5d9fa"/>
    <rect x="120" y="340" width="230" height="16" rx="8" fill="#c5d9fa"/>
    <rect x="120" y="376" width="160" height="16" rx="8" fill="#c5d9fa"/>
    <rect x="456" y="188" width="330" height="300" rx="16" fill="#edf8f1" stroke="#8bd1a3"/>
    <text x="486" y="238" fill="#173f29" font-size="24" font-weight="700">实时预览</text>
    <rect x="506" y="278" width="230" height="140" rx="12" fill="#ffffff" stroke="#b5dac2"/>
    <rect x="536" y="310" width="170" height="18" rx="9" fill="#9ed3af"/>
    <rect x="536" y="350" width="112" height="50" rx="10" fill="#d8efdf"/>
    <rect x="836" y="188" width="294" height="300" rx="16" fill="#fff1f5" stroke="#efa7bd"/>
    <text x="866" y="238" fill="#693044" font-size="24" font-weight="700">AI 侧边栏</text>
    <rect x="868" y="276" width="220" height="42" rx="12" fill="#ffffff" stroke="#f0bccb"/>
    <rect x="868" y="338" width="180" height="42" rx="12" fill="#ffffff" stroke="#f0bccb"/>
    <rect x="868" y="400" width="92" height="38" rx="10" fill="#db557c"/>
    <text x="891" y="425" fill="#ffffff" font-size="16" font-weight="700">确认</text>
  </g>
</svg>
