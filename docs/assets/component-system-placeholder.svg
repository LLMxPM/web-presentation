<!-- 文件功能：组件管理体系文档的占位示意图。 -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">组件管理体系占位图</title>
  <desc id="desc">展示组件草稿、组件库、发布版本和页面引用的关系。</desc>
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="72" y="92" fill="#172033" font-family="Arial, sans-serif" font-size="34" font-weight="700">组件管理体系</text>
  <text x="72" y="132" fill="#657089" font-family="Arial, sans-serif" font-size="18">占位图：可替换为真实组件库与组件预览截图</text>
  <g font-family="Arial, sans-serif">
    <rect x="76" y="202" width="236" height="220" rx="20" fill="#ffffff" stroke="#cad3e0" stroke-width="2"/>
    <text x="118" y="254" fill="#1d2d46" font-size="24" font-weight="700">组件草稿</text>
    <rect x="116" y="286" width="156" height="22" rx="11" fill="#b8cff7"/>
    <rect x="116" y="326" width="112" height="58" rx="12" fill="#d9e7fb"/>
    <rect x="482" y="178" width="236" height="268" rx="20" fill="#eef8f2" stroke="#83c99c" stroke-width="2"/>
    <text x="526" y="234" fill="#183f2a" font-size="24" font-weight="700">组件库</text>
    <rect x="526" y="270" width="148" height="46" rx="12" fill="#ffffff" stroke="#aadbb8"/>
    <rect x="526" y="336" width="148" height="46" rx="12" fill="#ffffff" stroke="#aadbb8"/>
    <rect x="888" y="202" width="236" height="220" rx="20" fill="#fff2df" stroke="#edb870" stroke-width="2"/>
    <text x="930" y="254" fill="#563607" font-size="24" font-weight="700">页面引用</text>
    <rect x="930" y="292" width="152" height="72" rx="14" fill="#ffffff" stroke="#efc684"/>
  </g>
  <g stroke="#7f899a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M324 312h146"/>
    <path d="M460 302l10 10-10 10"/>
    <path d="M730 312h146"/>
    <path d="M866 302l10 10-10 10"/>
  </g>
</svg>
