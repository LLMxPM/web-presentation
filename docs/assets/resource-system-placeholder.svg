<!-- 文件功能：资源管理体系文档的占位示意图。 -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">资源管理体系占位图</title>
  <desc id="desc">展示资源上传、资源库管理、页面组件引用和构建交付的关系。</desc>
  <rect width="1200" height="560" fill="#f7f9fc"/>
  <rect x="62" y="58" width="1076" height="444" rx="24" fill="#ffffff" stroke="#d8dee9" stroke-width="2"/>
  <text x="98" y="116" fill="#172033" font-family="Arial, sans-serif" font-size="34" font-weight="700">资源管理体系</text>
  <text x="98" y="154" fill="#657089" font-family="Arial, sans-serif" font-size="18">占位图：可替换为真实资源库、上传和引用截图</text>
  <g font-family="Arial, sans-serif">
    <rect x="108" y="230" width="186" height="142" rx="18" fill="#edf5ff" stroke="#91b7ee"/>
    <text x="156" y="288" fill="#17345d" font-size="24" font-weight="700">上传</text>
    <text x="138" y="324" fill="#52647c" font-size="16">图片 / 字体 / 文件</text>
    <rect x="382" y="204" width="214" height="194" rx="18" fill="#eef8f2" stroke="#83c99c"/>
    <text x="430" y="262" fill="#183f2a" font-size="24" font-weight="700">资源库</text>
    <rect x="428" y="292" width="122" height="18" rx="9" fill="#a7dcb6"/>
    <rect x="428" y="326" width="88" height="18" rx="9" fill="#c7e9d0"/>
    <rect x="684" y="230" width="186" height="142" rx="18" fill="#fff4e4" stroke="#edbd74"/>
    <text x="732" y="288" fill="#573507" font-size="24" font-weight="700">引用</text>
    <text x="718" y="324" fill="#675335" font-size="16">页面 / 组件 / 主题</text>
    <rect x="958" y="230" width="142" height="142" rx="18" fill="#fff0f5" stroke="#eda7bd"/>
    <text x="1006" y="288" fill="#653246" font-size="24" font-weight="700">交付</text>
    <text x="988" y="324" fill="#745262" font-size="16">预览 / 构建</text>
  </g>
  <g stroke="#8791a3" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M306 302h64"/>
    <path d="M360 292l10 10-10 10"/>
    <path d="M608 302h64"/>
    <path d="M662 292l10 10-10 10"/>
    <path d="M882 302h64"/>
    <path d="M936 292l10 10-10 10"/>
  </g>
</svg>
