# 文件功能：提供生产/预发布环境的容器编排模板，使用同一个平台镜像启动 Backend 与 Editor Gateway。

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-web_presentation}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请设置 POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-web_presentation}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-migrate:
    image: ${WEB_PRESENTATION_IMAGE:?请设置 WEB_PRESENTATION_IMAGE}
    restart: "no"
    working_dir: /app/backend
    command: ["alembic", "upgrade", "head"]
    environment: &backend-env
      APP_RELOAD: "false"
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/web_presentation}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-web_presentation}
      BACKEND_PUBLIC_BASE_URL: ${BACKEND_PUBLIC_BASE_URL:-${PUBLIC_BASE_URL}}
      RUNTIME_BASE_URL: ${RUNTIME_BASE_URL:-http://runtime:7373}
      RUNTIME_PUBLIC_BASE_URL: ${RUNTIME_PUBLIC_BASE_URL:-${PUBLIC_BASE_URL}/runtime}
      RUNTIME_SERVICE_TOKEN_AUDIENCE: ${RUNTIME_SERVICE_TOKEN_AUDIENCE:-runtime-backend}
      SESSION_SECURE: ${SESSION_SECURE:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-["${PUBLIC_BASE_URL}"]}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?请设置 DEFAULT_ADMIN_PASSWORD}
      DEFAULT_ADMIN_DISPLAY_NAME: ${DEFAULT_ADMIN_DISPLAY_NAME:-平台系统管理员}
      AI_ENABLED: ${AI_ENABLED:-true}
      AI_SECRET_ENCRYPTION_KEY: ${AI_SECRET_ENCRYPTION_KEY:?请设置 AI_SECRET_ENCRYPTION_KEY}
      PAGE_SCREENSHOT_LOCAL_ROOT: /app/backend/data
      ASSET_STORAGE_DRIVER: ${ASSET_STORAGE_DRIVER:-local}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PUBLIC_BUCKET: ${S3_PUBLIC_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    image: ${WEB_PRESENTATION_IMAGE:?请设置 WEB_PRESENTATION_IMAGE}
    restart: unless-stopped
    working_dir: /app/backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment: *backend-env
    volumes:
      - backend-data:/app/backend/data
    expose:
      - "8000"
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  runtime:
    image: ${WEB_RUNTIME_IMAGE:?请设置 WEB_RUNTIME_IMAGE}
    restart: unless-stopped
    environment:
      RUNTIME_PREVIEW_JWKS_URL: ${RUNTIME_PREVIEW_JWKS_URL:-http://backend:8000/.well-known/jwks.json}
      RUNTIME_PREVIEW_TOKEN_AUDIENCE: ${RUNTIME_PREVIEW_TOKEN_AUDIENCE:-runtime-preview}
      RUNTIME_BUILD_TOKEN_AUDIENCE: ${RUNTIME_BUILD_TOKEN_AUDIENCE:-runtime-build}
      RUNTIME_DIAGNOSTICS_TOKEN_AUDIENCE: ${RUNTIME_DIAGNOSTICS_TOKEN_AUDIENCE:-runtime-diagnostics}
      RUNTIME_BACKEND_API_BASE_URL: ${RUNTIME_BACKEND_API_BASE_URL:-http://backend:8000}
      RUNTIME_STANDALONE_PREVIEW_ENABLED: ${RUNTIME_STANDALONE_PREVIEW_ENABLED:-false}
    expose:
      - "7373"
    depends_on:
      backend:
        condition: service_healthy

  gateway:
    image: ${WEB_PRESENTATION_IMAGE:?请设置 WEB_PRESENTATION_IMAGE}
    restart: unless-stopped
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "${GATEWAY_HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
      runtime:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  backend-data:
